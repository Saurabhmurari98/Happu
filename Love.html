<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Singh Experience</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      overflow:hidden;
      height:100vh;
      background:
      radial-gradient(circle at top,#1f1f3a,#090909);
      color:white;
      position:relative;
    }

    /* STARS */

    .stars{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:0;
    }

    .star{
      position:absolute;
      width:3px;
      height:3px;
      background:white;
      border-radius:50%;
      animation:twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle{
      0%,100%{
        opacity:0.2;
        transform:scale(1);
      }

      50%{
        opacity:1;
        transform:scale(2.2);
      }
    }

    /* HEARTS */

    .hearts-container{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:1;
      pointer-events:none;
    }

    .heart{
      position:absolute;
      color:#ff4da6;
      font-size:24px;
      animation:floatHeart linear forwards;
      filter:drop-shadow(0 0 10px #ff4da6);
    }

    @keyframes floatHeart{

      0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
      }

      20%{
        opacity:1;
      }

      100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
      }
    }

    .burst{
      position:absolute;
      font-size:30px;
      animation:burstAnim 0.8s ease forwards;
    }

    @keyframes burstAnim{

      0%{
        transform:scale(0.5);
        opacity:1;
      }

      100%{
        transform:scale(2.5);
        opacity:0;
      }
    }

    /* FLOATING ICONS */

    .floating-icons span{
      position:absolute;
      font-size:30px;
      animation:fly 10s linear infinite;
      opacity:0.6;
      z-index:1;
    }

    @keyframes fly{

      0%{
        transform:translateY(100vh) rotate(0deg);
      }

      100%{
        transform:translateY(-120vh) rotate(360deg);
      }
    }

    /* MAIN */

    .main{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      padding:20px;
      text-align:center;
    }

    .glow-ring{
      position:absolute;
      width:420px;
      height:420px;
      border-radius:50%;
      background:
      conic-gradient(#ff00cc,#3333ff,#00ffee,#ff00cc);

      animation:rotate 8s linear infinite;
      filter:blur(25px);
      opacity:0.7;
    }

    @keyframes rotate{

      from{
        transform:rotate(0deg);
      }

      to{
        transform:rotate(360deg);
      }
    }

    /* CARD */

    .card{
      position:relative;
      width:700px;
      max-width:95%;
      padding:60px 40px;
      border-radius:35px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.12);

      box-shadow:0 0 40px rgba(255,255,255,0.08);

      overflow:hidden;

      animation:float 4s ease-in-out infinite;
    }

    @keyframes float{

      0%,100%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-12px);
      }
    }

    /* SHINE */

    .shine{
      position:absolute;
      top:-120%;
      left:-40%;
      width:50%;
      height:300%;
      background:rgba(255,255,255,0.15);
      transform:rotate(25deg);
      animation:shine 5s infinite linear;
    }

    @keyframes shine{

      0%{
        left:-60%;
      }

      100%{
        left:130%;
      }
    }

    /* BADGE */

    .badge{
      display:inline-block;
      padding:10px 22px;

      background:
      linear-gradient(45deg,#ff00cc,#6a5cff);

      border-radius:30px;
      font-size:14px;
      letter-spacing:2px;
      margin-bottom:25px;

      animation:pulse 2s infinite;
    }

    @keyframes pulse{

      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.08);
      }

      100%{
        transform:scale(1);
      }
    }

    /* IMAGE */

    .image-box{
      width:180px;
      height:180px;
      margin:25px auto;
      border-radius:50%;
      padding:6px;

      background:
      linear-gradient(45deg,#ff00cc,#00ffee,#6a5cff);

      animation:rotateBorder 6s linear infinite;

      box-shadow:0 0 35px rgba(255,0,200,0.5);
    }

    .image-box img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
      border:4px solid #111;
    }

    @keyframes rotateBorder{

      from{
        transform:rotate(0deg);
      }

      to{
        transform:rotate(360deg);
      }
    }

    /* TITLE */

    h1{
      font-size:75px;
      font-weight:700;

      background:
      linear-gradient(90deg,#ffffff,#00ffee,#ff00cc);

      background-size:300%;

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;

      animation:textGlow 5s infinite linear;

      line-height:1.1;
    }

    @keyframes textGlow{

      0%{
        background-position:0%;
      }

      100%{
        background-position:300%;
      }
    }

    /* LINE */

    .line{
      width:120px;
      height:4px;
      border-radius:20px;

      background:
      linear-gradient(90deg,#ff00cc,#00ffee);

      margin:25px auto;

      animation:expand 3s infinite ease-in-out;
    }

    @keyframes expand{

      0%,100%{
        width:120px;
      }

      50%{
        width:220px;
      }
    }

    /* SUBTITLE */

    .subtitle{
      margin-top:25px;
      font-size:20px;
      color:rgba(255,255,255,0.8);
      line-height:1.8;
    }

    .highlight{
      color:#00ffee;
      font-weight:600;
    }

    /* BUTTONS */

    .btns{
      margin-top:40px;
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      padding:16px 34px;
      border:none;
      border-radius:50px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.4s ease;
    }

    .btn1{
      background:
      linear-gradient(45deg,#ff00cc,#6a5cff);

      color:white;

      box-shadow:0 0 25px rgba(255,0,204,0.5);
    }

    .btn2{
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.2);
      color:white;
    }

    button:hover{
      transform:translateY(-6px) scale(1.05);
      box-shadow:0 10px 30px rgba(255,255,255,0.2);
    }

    /* FOOTER */

    .footer-text{
      margin-top:35px;
      font-size:14px;
      letter-spacing:3px;
      color:rgba(255,255,255,0.5);
    }

    /* MOBILE */

    @media(max-width:768px){

      h1{
        font-size:48px;
      }

      .subtitle{
        font-size:16px;
      }

      .card{
        padding:45px 20px;
      }

      .glow-ring{
        width:300px;
        height:300px;
      }

      .image-box{
        width:140px;
        height:140px;
      }
    }

  </style>
</head>

<body>

  <!-- STARS -->

  <div class="stars" id="stars"></div>

  <!-- HEARTS -->

  <div class="hearts-container"></div>

  <!-- FLOATING ICONS -->

  <div class="floating-icons">
    <span style="left:10%; animation-delay:0s;">✨</span>
    <span style="left:20%; animation-delay:2s;">⚡</span>
    <span style="left:35%; animation-delay:4s;">🌟</span>
    <span style="left:50%; animation-delay:1s;">💫</span>
    <span style="left:65%; animation-delay:5s;">🚀</span>
    <span style="left:80%; animation-delay:3s;">🔥</span>
    <span style="left:90%; animation-delay:6s;">🎧</span>
  </div>

  <!-- MAIN -->

  <div class="main">

    <div class="glow-ring"></div>

    <div class="card">

      <div class="shine"></div>

      <div class="badge">
        SPECIAL FOR YOU
      </div>

      <!-- IMAGE -->

      <div class="image-box">
        <img src="img/happu.jpg" alt="Happy Singh">
      </div>

      <!-- TITLE -->

      <h1>
        Happy Singh
      </h1>

      <div class="line"></div>

      <!-- TEXT -->

      <p class="subtitle">

        Some people carry a different vibe ✨
        <br>

        And
        <span class="highlight">
          Happy Singh
        </span>

        is definitely one of them.

        <br><br>

        Calm energy, iconic presence,
        and a personality that naturally
        stands out in every crowd 🚀

      </p>

      <!-- BUTTONS -->

      <div class="btns">

        <button class="btn1"
        onclick="showMessage()">

          Tap for Surprise

        </button>

        <button class="btn2">

          Future Legend

        </button>

      </div>

      <!-- FOOTER -->

      <div class="footer-text">

        DESIGNED BY S ⚡

      </div>

    </div>

  </div>

  <script>

    /* STARS */

    const stars =
    document.getElementById('stars');

    for(let i=0;i<120;i++){

      const star =
      document.createElement('div');

      star.classList.add('star');

      star.style.left =
      Math.random()*100 + '%';

      star.style.top =
      Math.random()*100 + '%';

      star.style.animationDuration =
      (Math.random()*3 + 2) + 's';

      star.style.opacity =
      Math.random();

      stars.appendChild(star);
    }

    /* POPUP */

    function showMessage(){

      const messages = [

        '⚡ Energy Level: Unmatched',

        '✨ Main Character Aura Detected',

        '🚀 Future Superstar Loading...',

        '🔥 Style + Confidence = Legendary Combo',

        '🌟 Some vibes are impossible to ignore'

      ];

      const random =
      Math.floor(Math.random()*messages.length);

      const popup =
      document.createElement('div');

      popup.innerText =
      messages[random];

      popup.style.position='absolute';

      popup.style.top='50%';

      popup.style.left='50%';

      popup.style.transform=
      'translate(-50%, -50%)';

      popup.style.padding='20px 35px';

      popup.style.background=
      'rgba(0,0,0,0.75)';

      popup.style.backdropFilter='blur(10px)';

      popup.style.border=
      '1px solid rgba(255,255,255,0.2)';

      popup.style.borderRadius='20px';

      popup.style.fontSize='22px';

      popup.style.zIndex='999';

      popup.style.boxShadow=
      '0 0 35px rgba(255,255,255,0.2)';

      popup.style.animation=
      'popupAnim 0.5s ease';

      document.body.appendChild(popup);

      setTimeout(()=>{
        popup.remove();
      },2500);
    }

    /* POPUP ANIMATION */

    const style =
    document.createElement('style');

    style.innerHTML=`

      @keyframes popupAnim{

        from{
          transform:
          translate(-50%, -50%)
          scale(0.5);

          opacity:0;
        }

        to{
          transform:
          translate(-50%, -50%)
          scale(1);

          opacity:1;
        }
      }

    `;

    document.head.appendChild(style);

    /* HEARTS */

    const heartsContainer =
    document.querySelector('.hearts-container');

    function createHeart(){

      const heart =
      document.createElement('div');

      heart.classList.add('heart');

      heart.innerHTML='💖';

      heart.style.left =
      Math.random()*100 + '%';

      heart.style.animationDuration =
      (Math.random()*4 + 4) + 's';

      heartsContainer.appendChild(heart);

      setTimeout(()=>{

        const burst =
        document.createElement('div');

        burst.classList.add('burst');

        burst.innerHTML='💥';

        burst.style.left=
        heart.style.left;

        burst.style.top='10%';

        heartsContainer.appendChild(burst);

        heart.remove();

        setTimeout(()=>{
          burst.remove();
        },800);

      },5000);
    }

    setInterval(createHeart,700);

  </script>

</body>
</html>
